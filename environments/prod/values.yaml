replicaCount: 3

image:
  repository: sample-app
  tag: "latest"

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rate-limit: "100"
  hosts:
    - host: "sample-app.example.com"
      paths:
        - path: /
          pathType: Prefix
    - host: "www.sample-app.example.com"
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: sample-app-prod-tls
      hosts:
        - sample-app.example.com
        - www.sample-app.example.com

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 75
  targetMemoryUtilizationPercentage: 80

podDisruptionBudget:
  enabled: true
  minAvailable: 2

affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
            - key: app.kubernetes.io/name
              operator: In
              values:
                - sample-app
        topologyKey: kubernetes.io/hostname

env:
  - name: LOG_LEVEL
    value: "warn"
  - name: ENVIRONMENT
    value: "production"
